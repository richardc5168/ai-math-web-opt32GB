<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Dashboard MVP</title>
  <script src="../../shared/school_first_mock_data.js"></script>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --ink: #1e2430;
      --muted: #677185;
      --line: #d8cdbd;
      --accent: #0f766e;
      --warn: #b45309;
      --risk: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Georgia, "Noto Serif TC", serif; color: var(--ink); background: radial-gradient(circle at top right, #f3ddc1 0, var(--bg) 40%); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .hero { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: 0 10px 24px rgba(30,36,48,.08); }
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 14px; }
    .kpi strong { display: block; font-size: 1.8rem; }
    .grid { display: grid; grid-template-columns: 1.3fr .7fr; gap: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); font-size: .95rem; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: .85rem; }
    .risk { background: #fee2e2; color: var(--risk); }
    .mid { background: #fef3c7; color: var(--warn); }
    .good { background: #dcfce7; color: #166534; }
    .bars { display: grid; gap: 10px; }
    .bar { background: #e7ddd0; border-radius: 999px; overflow: hidden; height: 14px; }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #0f766e, #1d4ed8); }
    @media (max-width: 900px) { .hero, .grid, .kpis { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <script>
    const data = window.AIMathSchoolFirstMockData.buildFixture();
    const cls = data.classes[0];
    const topRisk = [...cls.students].sort((a, b) => b.risk_score - a.risk_score).slice(0, 10);
    const app = document.getElementById('app');
    app.innerHTML = `
      <section class="hero">
        <div class="card">
          <div>Teacher-first MVP</div>
          <h1>${cls.teacher_name} · ${cls.class_name}</h1>
          <p>Pre/post analytics, intervention evidence, and student-level drill-down using school-first mock data.</p>
          <div class="kpis">
            <div class="kpi"><strong>${cls.summary.student_count}</strong><span>students</span></div>
            <div class="kpi"><strong>${Math.round(cls.summary.pre_accuracy * 100)}%</strong><span>pre-test</span></div>
            <div class="kpi"><strong>${Math.round(cls.summary.post_accuracy * 100)}%</strong><span>post-test</span></div>
            <div class="kpi"><strong>${cls.summary.improved}</strong><span>improved</span></div>
          </div>
        </div>
        <div class="card">
          <h3>Intervention</h3>
          <p><strong>${cls.intervention.title}</strong></p>
          <p>${cls.intervention.method}</p>
          <p>Targets: ${cls.intervention.target_skills.join(', ')}</p>
        </div>
      </section>
      <section class="grid">
        <div class="card">
          <h2>High-risk students</h2>
          <table>
            <thead><tr><th>Student</th><th>Pre</th><th>Post</th><th>Delta</th><th>Risk</th></tr></thead>
            <tbody>
              ${topRisk.map((student) => `
                <tr>
                  <td>${student.display_name}</td>
                  <td>${Math.round(student.pre_accuracy * 100)}%</td>
                  <td>${Math.round(student.post_accuracy * 100)}%</td>
                  <td>${Math.round(student.delta * 100)} pts</td>
                  <td><span class="pill ${student.risk_score > 75 ? 'risk' : student.risk_score > 45 ? 'mid' : 'good'}">${student.risk_score}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="card">
          <h2>Before / After</h2>
          <div class="bars">
            <div>
              <div>Class pre-test</div>
              <div class="bar"><span style="width:${Math.round(cls.summary.pre_accuracy * 100)}%"></span></div>
            </div>
            <div>
              <div>Class post-test</div>
              <div class="bar"><span style="width:${Math.round(cls.summary.post_accuracy * 100)}%"></span></div>
            </div>
          </div>
          <p>Improved: ${cls.summary.improved} · Flat: ${cls.summary.flat} · Regressed: ${cls.summary.regressed}</p>
        </div>
      </section>`;
  </script>
</body>
</html>
